name: VitalNet CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: read

concurrency:
  group: vitalnet-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.13'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r backend/requirements.txt
          pip install --no-cache-dir ruff==0.13.2
      - name: Run Ruff
        run: python -m ruff check backend

  build-frontend-pr:
    # PR-triggered build + the offline-model parity check. Deliberately does
    # NOT receive repository secrets (untrusted PR code, e.g. from a fork or
    # Dependabot, could exfiltrate them) — uses placeholder env values, which
    # is safe because this job only validates the build compiles and that the
    # committed golden vectors parity-check against the committed tree JSON
    # (neither requires live credentials).
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4  # TODO: pin to a verified commit SHA to match this repo's other actions (see docs/SECURITY.md "Dependency management")
        with:
          version: '10'
      - name: Install workspace deps (no install scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: clinical-core tests
        # The single source of clinical truth (packages/clinical-core) — every
        # rule's embedded citation+vector, the ported safety/fuzz suites, and
        # the golden vectors (incl. the tree-evaluator and feature-engineering
        # golden vectors that used to need separate apps/web parity suites —
        # Round 6 rebuild plan Phase 5: apps/web now imports this package
        # directly instead of maintaining its own mirrored copies, so there is
        # nothing left in apps/web that could drift from the server). If this
        # fails, a clinical rule regressed.
        run: pnpm --filter @vitalnet/clinical-core test
      - name: Build
        run: pnpm --filter @vitalnet/web run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          VITE_API_BASE_URL: http://localhost:8000

  test-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.13'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r backend/requirements.txt
          pip install --no-cache-dir pytest==8.3.4 pytest-asyncio==0.24.0 httpx==0.27.2
      - name: Run Pytest
        # test_e2e.py is an integration test needing a live server + real
        # Supabase project — excluded here. tests/conftest.py supplies
        # fallback fake creds for the unit/safety/authz tests when secrets
        # aren't configured for this run.
        run: python -m pytest backend/tests/ -v --ignore=backend/tests/test_e2e.py
        env:
          SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.TEST_SUPABASE_JWT_SECRET }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.TEST_GROQ_API_KEY }}

  build-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4  # TODO: pin to a verified commit SHA to match this repo's other actions (see docs/SECURITY.md "Dependency management")
        with:
          version: '10'
      - name: Install workspace deps (no install scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: clinical-core tests
        run: pnpm --filter @vitalnet/clinical-core test
      - name: Build
        run: pnpm --filter @vitalnet/web run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

  sbom:
    # Software Bill of Materials — supply-chain transparency (docs/SECURITY.md
    # "Dependency management"). Diagnostic/compliance artifact, not a merge
    # gate: it only fails if the SBOM tooling itself breaks, not on anything
    # about the dependency contents (that's Dependabot's job).
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.13'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4  # TODO: pin to a verified commit SHA to match this repo's other actions (see docs/SECURITY.md "Dependency management")
        with:
          version: '10'
      - name: Generate backend SBOM (CycloneDX)
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir cyclonedx-bom==7.3.0
          cyclonedx-py requirements backend/requirements.txt -o backend-sbom.json --of json
      - name: Install workspace deps (needed for an accurate SBOM)
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Generate frontend SBOM (CycloneDX)
        run: npx --yes @cyclonedx/cyclonedx-npm --output-file ../../frontend-sbom.json --ignore-npm-errors
        working-directory: apps/web
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: sbom-${{ github.sha }}
          path: |
            backend-sbom.json
            frontend-sbom.json
          retention-days: 90
