name: VitalNet CI

on:
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx ruff
      - name: Lint (ruff)
        run: |
          cd backend
          ruff check .
      - name: Run Pytest
        # test_e2e.py is an integration test needing a live server + real
        # Supabase project — excluded from the unit CI. The unit/safety/authz
        # tests (incl. the classifier safety guarantees and admin-authz
        # regression) run here; tests/conftest.py provides fallback fake creds
        # so they pass even without secrets configured.
        run: |
          cd backend
          python -m pytest tests/ -v --ignore=tests/test_e2e.py
        env:
          SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.TEST_SUPABASE_JWT_SECRET }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.TEST_GROQ_API_KEY }}
          # Gemini and LLM mocked out during unit tests

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: |
          cd frontend
          npm ci
      - name: Offline-model parity (JS == server model)
        # Guards that the pure-JS offline tree evaluator produces the SAME
        # triage as the server model on the committed golden vectors. If this
        # fails, offline triage would diverge from online — block the merge.
        run: |
          cd frontend
          npm run test:parity
      - name: Build
        run: |
          cd frontend
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: https://vitalnet-staging.app
