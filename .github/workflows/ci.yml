name: VitalNet CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: read

concurrency:
  group: vitalnet-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.13'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r backend/requirements.txt
          pip install --no-cache-dir ruff==0.13.2
      - name: Run Ruff
        run: python -m ruff check backend

  build-frontend-pr:
    # PR-triggered build + the offline-model parity check. Deliberately does
    # NOT receive repository secrets (untrusted PR code, e.g. from a fork or
    # Dependabot, could exfiltrate them) — uses placeholder env values, which
    # is safe because this job only validates the build compiles and that the
    # committed golden vectors parity-check against the committed tree JSON
    # (neither requires live credentials).
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4  # TODO: pin to a verified commit SHA to match this repo's other actions (see docs/SECURITY.md "Dependency management")
        with:
          version: '10'
      - name: Install workspace deps (no install scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: clinical-core tests
        # The single source of clinical truth (packages/clinical-core) — every
        # rule's embedded citation+vector, the ported safety/fuzz suites, and
        # the golden vectors (incl. the tree-evaluator and feature-engineering
        # golden vectors that used to need separate apps/web parity suites —
        # Round 6 rebuild plan Phase 5: apps/web now imports this package
        # directly instead of maintaining its own mirrored copies, so there is
        # nothing left in apps/web that could drift from the server). If this
        # fails, a clinical rule regressed.
        run: pnpm --filter @vitalnet/clinical-core test
      - name: Build
        run: pnpm --filter @vitalnet/web run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          VITE_API_BASE_URL: http://localhost:8000

  a11y-frontend-pr:
    # WCAG 2 A/AA scan (axe-core via Playwright) of the main screen for every
    # role. Same no-secrets posture as build-frontend-pr: every test drives
    # the dev server against a mocked Supabase/legacy-API backend
    # (tests/helpers/mockBackend.js) rather than a live project, so untrusted
    # PR code never sees real credentials. See docs/ACCESSIBILITY.md.
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4  # TODO: pin to a verified commit SHA to match this repo's other actions (see docs/SECURITY.md "Dependency management")
        with:
          version: '10'
      - name: Install workspace deps (no install scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Build clinical-core (workspace dependency, not auto-built by --ignore-scripts)
        # apps/web imports @vitalnet/clinical-core's compiled dist/ (its
        # package.json "exports" point there), but nothing triggers that
        # build automatically here — build-frontend-pr only gets it as a
        # side effect of its "clinical-core tests" step's pretest hook.
        # The dev server this job's Playwright tests run against needs it
        # built explicitly, or every page importing it 404s on import.
        run: pnpm --filter @vitalnet/clinical-core run build
      - name: Install Playwright's Chromium
        run: pnpm --filter @vitalnet/web exec playwright install --with-deps chromium
      - name: Run axe-core accessibility suite
        run: pnpm --filter @vitalnet/web exec playwright test tests/a11y.spec.js
        env:
          CI: true
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          VITE_API_BASE_URL: http://localhost:8000
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: failure()
        with:
          name: a11y-report-${{ github.sha }}
          path: apps/web/playwright-report/
          retention-days: 14

  db-schema-drift:
    # Verifies every tracked migration newer than schema_snapshot.sql's
    # baseline actually applies cleanly on top of it. Doesn't need live
    # Supabase credentials — schema_snapshot.sql is a real pg_catalog
    # capture of the live project (see its header + docs/DECISIONS.md for
    # how it was obtained), not a hand-written guess, and this job replays
    # tracked migrations against a disposable Postgres service container.
    # This exists because backend/supabase/migrations/phase28 through
    # phase31 sat committed in git for a while without ever being applied
    # to the live project — every apps/api endpoint that depended on them
    # was broken and nothing caught it. This job is what would have.
    runs-on: ubuntu-latest
    timeout-minutes: 8
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Stub Supabase-managed objects (auth schema, untracked helper fns)
        run: psql "postgresql://postgres:postgres@localhost:5432/postgres" -v ON_ERROR_STOP=1 -f backend/supabase/ci_stubs.sql
      - name: Load schema_snapshot.sql baseline
        run: psql "postgresql://postgres:postgres@localhost:5432/postgres" -v ON_ERROR_STOP=1 -f backend/supabase/schema_snapshot.sql
      - name: Apply every migration newer than the snapshot's baseline
        run: |
          baseline=$(grep -oP '^-- SNAPSHOT_BASELINE_PHASE=\K[0-9]+' backend/supabase/schema_snapshot.sql)
          echo "Snapshot baseline: phase $baseline"
          applied=0
          # Sort numerically by phase number, not lexicographically by filename
          # (lexicographic sort silently breaks once phase numbers cross a digit
          # boundary, e.g. phase9 vs phase10 — "phase10" < "phase9" as strings).
          for f in $(for m in backend/supabase/migrations/phase*.sql; do
                       phase=$(basename "$m" | grep -oP '^phase\K[0-9]+')
                       echo "$phase $m"
                     done | sort -n -k1,1 | cut -d' ' -f2-); do
            phase=$(basename "$f" | grep -oP '^phase\K[0-9]+')
            if [ "$phase" -gt "$baseline" ]; then
              echo "Applying $f ..."
              psql "postgresql://postgres:postgres@localhost:5432/postgres" -v ON_ERROR_STOP=1 -f "$f"
              applied=$((applied + 1))
            fi
          done
          echo "Applied $applied migration(s) beyond the snapshot baseline."

  test-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.13'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r backend/requirements.txt
          pip install --no-cache-dir pytest==8.3.4 pytest-asyncio==0.24.0 httpx==0.27.2
      - name: Run Pytest
        # test_e2e.py is an integration test needing a live server + real
        # Supabase project — excluded here. tests/conftest.py supplies
        # fallback fake creds for the unit/safety/authz tests when secrets
        # aren't configured for this run.
        run: python -m pytest backend/tests/ -v --ignore=backend/tests/test_e2e.py
        env:
          SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.TEST_SUPABASE_JWT_SECRET }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.TEST_GROQ_API_KEY }}

  build-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4  # TODO: pin to a verified commit SHA to match this repo's other actions (see docs/SECURITY.md "Dependency management")
        with:
          version: '10'
      - name: Install workspace deps (no install scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: clinical-core tests
        run: pnpm --filter @vitalnet/clinical-core test
      - name: Build
        run: pnpm --filter @vitalnet/web run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

  sbom:
    # Software Bill of Materials — supply-chain transparency (docs/SECURITY.md
    # "Dependency management"). Diagnostic/compliance artifact, not a merge
    # gate: it only fails if the SBOM tooling itself breaks, not on anything
    # about the dependency contents (that's Dependabot's job).
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.13'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4  # TODO: pin to a verified commit SHA to match this repo's other actions (see docs/SECURITY.md "Dependency management")
        with:
          version: '10'
      - name: Generate backend SBOM (CycloneDX)
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir cyclonedx-bom==7.3.0
          cyclonedx-py requirements backend/requirements.txt -o backend-sbom.json --of json
      - name: Install workspace deps (needed for an accurate SBOM)
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Generate frontend SBOM (CycloneDX)
        run: npx --yes @cyclonedx/cyclonedx-npm --output-file ../../frontend-sbom.json --ignore-npm-errors
        working-directory: apps/web
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-${{ github.sha }}
          path: |
            backend-sbom.json
            frontend-sbom.json
          retention-days: 90
