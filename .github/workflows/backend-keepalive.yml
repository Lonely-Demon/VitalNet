name: Backend Keep-Alive

# Free tiers on hosts like Render spin the backend down after ~10-15 minutes
# of no incoming requests, causing a slow cold-start on the next real
# request. This pings GET /api/health (public, unauthenticated, cheap) every
# 10 minutes to keep the instance warm.
#
# HONEST LIMITATION (docs/DECISIONS.md §28): GitHub's schedule trigger is
# best-effort — delays of 5-30+ minutes under load are common and
# documented, so this is NOT a reliable substitute for a dedicated uptime
# monitor (UptimeRobot, cron-job.org, Better Uptime, etc., all of which
# offer free 5-minute checks with far tighter timing guarantees). Use this
# as a free, versioned first line of defense, not the final answer, if
# cold-starts are a real problem in practice.
#
# Requires a repository VARIABLE (Settings > Secrets and variables > Actions
# > Variables) named BACKEND_HEALTH_URL, e.g. https://your-app.onrender.com.
# No value is secret here (it's a public health check URL), so it's a
# variable, not a secret. No-ops until it's set.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /api/health
        env:
          BACKEND_HEALTH_URL: ${{ vars.BACKEND_HEALTH_URL }}
        run: |
          if [ -z "$BACKEND_HEALTH_URL" ]; then
            echo "BACKEND_HEALTH_URL repo variable not set — skipping (no deployed backend to keep warm yet)."
            exit 0
          fi
          status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$BACKEND_HEALTH_URL/api/health")
          echo "Backend /api/health responded HTTP $status"
          if [ "$status" -ge 500 ] || [ "$status" = "000" ]; then
            echo "::error::Backend health check failed (HTTP $status)"
            exit 1
          fi
