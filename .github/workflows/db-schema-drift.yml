name: DB Schema Drift Detection

# Two complementary checks (Round 6 rebuild plan, item 4 / DECISIONS.md
# §29, §32) aimed at the same failure mode: a change made directly against
# the live database, outside any tracked migration (§25 already recorded
# one such incident — an undocumented profiles_role_check CHECK constraint
# edit that silently blocked the new 'supervisor' role until discovered
# during manual E2E testing).
#
#   1. pr-migration-lint: on a PR touching backend/supabase/migrations/**,
#      replays backend/supabase/schema_baseline.sql (if present) plus every
#      tracked migration in order against a fresh Postgres, then diffs the
#      resulting schema against the committed backend/supabase/schema_snapshot.sql.
#   2. live-schema-fingerprint: weekly + on demand, calls the live
#      project's fn_schema_fingerprint() (phase28) and compares it to the
#      last known-good value, catching drift this repo's migrations never
#      caused in the first place.
#
# KNOWN GAP (documented, not silently worked around): this repo's earliest
# tracked migration is phase10 — the base tables (profiles, case_records,
# facilities, ...) predate migration tracking and are not themselves in any
# committed .sql file (DECISIONS.md §25, §29). Until backend/supabase/schema_baseline.sql
# exists (a one-time `pg_dump --schema-only` of a real project, taken once
# and committed), job 1 cannot replay from scratch and intentionally
# no-ops with a loud warning instead of either failing every unrelated PR
# or silently passing on a fake baseline.

on:
  pull_request:
    paths:
      - "backend/supabase/migrations/**"
      - "backend/supabase/schema_baseline.sql"
      - "backend/supabase/schema_snapshot.sql"
  schedule:
    - cron: "23 5 * * 1" # weekly, Monday
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  pr-migration-lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
      PGHOST: localhost
      PGUSER: postgres
      DB: driftcheck
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Check for a tracked base-schema snapshot
        id: baseline
        run: |
          if [ -f backend/supabase/schema_baseline.sql ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::backend/supabase/schema_baseline.sql does not exist yet, so this job cannot replay the schema from scratch (the tracked migrations start at phase10 and ALTER tables no committed file CREATEs — see this workflow's header). Generate it once with: pg_dump --schema-only --no-owner --no-privileges <staging-or-prod-connection-string> > backend/supabase/schema_baseline.sql, review it for anything environment-specific, and commit it. Skipping this check (not failing the PR) until that exists."
          fi

      - name: Create scratch database
        if: steps.baseline.outputs.present == 'true'
        run: psql -c "CREATE DATABASE ${DB};"

      - name: Apply baseline + all tracked migrations in order
        if: steps.baseline.outputs.present == 'true'
        run: |
          set -euo pipefail
          psql -d "$DB" -v ON_ERROR_STOP=1 -f backend/supabase/schema_baseline.sql
          for f in $(ls backend/supabase/migrations/*.sql | sort -V); do
            echo "Applying $f"
            psql -d "$DB" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Dump resulting schema
        if: steps.baseline.outputs.present == 'true'
        run: |
          pg_dump --schema-only --no-owner --no-privileges -d "$DB" \
            | grep -v '^--' | grep -v '^$' > /tmp/schema_dump.sql

      - name: Diff against the committed snapshot
        id: diff
        if: steps.baseline.outputs.present == 'true'
        run: |
          if [ ! -f backend/supabase/schema_snapshot.sql ]; then
            echo "::warning::backend/supabase/schema_snapshot.sql does not exist yet — uploading the freshly replayed schema as a build artifact instead of failing. Review it and commit it as the initial snapshot to turn this into a real drift check."
            # Copied into the workspace (not /tmp): upload-artifact and the
            # step-output gate below both operate workspace-relative.
            cp /tmp/schema_dump.sql schema_snapshot_proposed.sql
            echo "proposed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! diff -u backend/supabase/schema_snapshot.sql /tmp/schema_dump.sql; then
            echo "::error::Applying every tracked migration in order does not reproduce the committed schema_snapshot.sql. Either a migration is missing/wrong, or schema_snapshot.sql is stale — regenerate it (see this workflow's header) as part of this PR."
            exit 1
          fi
          echo "Schema matches the committed snapshot."

      - name: Upload proposed snapshot (bootstrap only)
        # A step output, not hashFiles(): hashFiles only matches paths under
        # GITHUB_WORKSPACE, so a /tmp path can never satisfy it and the
        # original condition was permanently false.
        if: steps.baseline.outputs.present == 'true' && steps.diff.outputs.proposed == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: schema_snapshot_proposed
          path: schema_snapshot_proposed.sql

  live-schema-fingerprint:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Compare live fn_schema_fingerprint() to the last known-good value
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EXPECTED_FINGERPRINT: ${{ vars.EXPECTED_SCHEMA_FINGERPRINT }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "SUPABASE_URL/SUPABASE_SERVICE_ROLE_KEY repo secrets not set — skipping (nothing to compare yet)."
            exit 0
          fi
          response=$(curl -s --max-time 20 -X POST \
            "$SUPABASE_URL/rest/v1/rpc/fn_schema_fingerprint" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json")
          echo "Live fingerprint response: $response"
          live_fp=$(echo "$response" | tr -d '"')

          if [ -z "$EXPECTED_FINGERPRINT" ]; then
            echo "::warning::vars.EXPECTED_SCHEMA_FINGERPRINT is not set yet. Current live fingerprint is: $live_fp — set this as a repository variable (Settings > Secrets and variables > Actions > Variables) once the schema is in a known-good state, so future runs can detect drift from it."
            exit 0
          fi

          if [ "$live_fp" != "$EXPECTED_FINGERPRINT" ]; then
            echo "::error::Live schema fingerprint ($live_fp) does not match the expected value ($EXPECTED_FINGERPRINT) — the database has changed outside a tracked migration. Investigate before assuming any migration is safe to apply."
            exit 1
          fi
          echo "Live fingerprint matches the expected value."
