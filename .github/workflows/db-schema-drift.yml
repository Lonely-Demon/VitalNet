name: DB Live Schema Fingerprint

# Complements the `db-schema-drift` job in ci.yml (Round 6 rebuild plan,
# item 4 / DECISIONS.md §29, §32, §35, §36), both aimed at the same failure
# mode: a change made directly against the live database, outside any
# tracked migration (§25 recorded one such incident — an undocumented
# profiles_role_check CHECK constraint edit that silently blocked the new
# 'supervisor' role until discovered during manual E2E testing; §35 later
# found four tracked migrations — phase28 through phase31 — that had gone
# the other direction and sat committed for a while without ever being
# applied live).
#
# ci.yml's `db-schema-drift` job handles the PR-time half: it replays every
# migration newer than backend/supabase/schema_snapshot.sql's baseline
# phase against a disposable Postgres container on every PR, catching a
# migration that doesn't apply cleanly before it merges. It needs no live
# credentials.
#
# This workflow handles the half that job architecturally cannot: drift
# that happens directly against the live project, with no migration file
# at all. live-schema-fingerprint calls the live project's
# fn_schema_fingerprint() (phase28) weekly and compares it to the last
# known-good value.
#
# HISTORY: this file previously also carried a `pr-migration-lint` job that
# predated schema_snapshot.sql and depended on a schema_baseline.sql that
# was never created — it never actually ran (gated behind a file-existence
# check that was always false) and is now superseded by ci.yml's working
# db-schema-drift job, so it was removed rather than left as dead,
# never-triggering CI.

on:
  schedule:
    - cron: "23 5 * * 1" # weekly, Monday
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  live-schema-fingerprint:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Compare live fn_schema_fingerprint() to the last known-good value
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EXPECTED_FINGERPRINT: ${{ vars.EXPECTED_SCHEMA_FINGERPRINT }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "SUPABASE_URL/SUPABASE_SERVICE_ROLE_KEY repo secrets not set — skipping (nothing to compare yet)."
            exit 0
          fi
          response=$(curl -s --max-time 20 -X POST \
            "$SUPABASE_URL/rest/v1/rpc/fn_schema_fingerprint" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json")
          echo "Live fingerprint response: $response"
          live_fp=$(echo "$response" | tr -d '"')

          if [ -z "$EXPECTED_FINGERPRINT" ]; then
            echo "::warning::vars.EXPECTED_SCHEMA_FINGERPRINT is not set yet. Current live fingerprint is: $live_fp — set this as a repository variable (Settings > Secrets and variables > Actions > Variables) once the schema is in a known-good state, so future runs can detect drift from it."
            exit 0
          fi

          if [ "$live_fp" != "$EXPECTED_FINGERPRINT" ]; then
            echo "::error::Live schema fingerprint ($live_fp) does not match the expected value ($EXPECTED_FINGERPRINT) — the database has changed outside a tracked migration. Investigate before assuming any migration is safe to apply."
            exit 1
          fi
          echo "Live fingerprint matches the expected value."
