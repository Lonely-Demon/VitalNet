name: Training pipeline (smoke test)

# Round 6 rebuild plan, Phase 6 — "kills the last mirror": tools/training/
# (moved from backend/scripts/) now pipes synthetic patients through
# packages/clinical-core/cli.mjs for labeling and feature engineering
# instead of maintaining its own Python port of the rules engine. This job
# does NOT run the real training pipeline (36,000 patients + sklearn fit +
# SHAP + ONNX export takes too long for a PR check, and would overwrite the
# committed model artifacts with a throwaway model) — it runs
# tools/training/smoke_test.py, which exercises exactly the part this
# refactor touched: patient generation -> the cli.mjs subprocess bridge ->
# a small labeled, featurized batch, on a few hundred patients. A real
# training run remains a manual/local operation (see backend/app/ml/README.md).

on:
  pull_request:
    paths:
      - "tools/training/**"
      - "packages/clinical-core/**"
  push:
    branches: [main, dev]
    paths:
      - "tools/training/**"
      - "packages/clinical-core/**"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4  # TODO: pin to a verified commit SHA to match this repo's other actions (see docs/SECURITY.md "Dependency management")
        with:
          version: '10'
      - name: Install workspace deps (no install scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Build @vitalnet/clinical-core
        # tools/training/train_classifier.py resolves cli.mjs's dependency
        # via this build output — see that script's module docstring.
        run: pnpm --filter @vitalnet/clinical-core build

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.13'
      - name: Install training dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r backend/requirements.txt -r backend/requirements-train.txt

      - name: Run training pipeline smoke test
        working-directory: tools/training
        run: python smoke_test.py
