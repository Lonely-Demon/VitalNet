services:
  - type: web
    name: vitalnet-backend
    runtime: python
    rootDirectory: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./vitalnet.db
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.13.1
